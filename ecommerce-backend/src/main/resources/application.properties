spring.application.name=e-com-project

# H2 File-based Database — data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/eshay;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart file upload limit (for product images)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
